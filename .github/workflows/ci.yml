name: Reproduce

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build and run on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: npm install

      - name: Build
        run: npm run build

      - name: Show dist/index.js
        run: npm run show

      - name: Run dist/index.js
        run: npm run run-dist
